<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>CatchABugs Engine-01</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="title">
    <div class="logo">CatchABugs</div>
    <div class="sub">캡챠벅스 Engine-01</div>
    <div class="prof">👨‍🔬 호박사<br>“구조를 나눴다. 이제 덜 엉킬 거야. 아마도.”</div>
    <button id="start" class="btn">탐험 시작</button>
    <button id="openDexTitle" class="btn ghost">도감 보기</button>
  </div>

  <div id="game">
    <div id="map" class="map"></div>
    <div id="bugs"></div>
    <div class="player"><img src="https://raw.githubusercontent.com/HESEB/buget/main/assets/player.png" onerror="this.remove();this.parentNode.textContent='🧢'"></div>
    <div class="hud">
      <div class="card">Engine-01</div>
      <div class="card">연구별 <span id="pt">0</span></div>
    </div>
    <div class="bottom">
      <button id="openDex" class="mini">도감</button>
      <button id="diary" class="mini">일기</button>
      <button id="home" class="mini">귀환</button>
    </div>
    <div id="toast" class="toast"></div>
  </div>

  <div id="enc" class="enc">
    <div class="panel">
      <div class="stage">
        <img class="net" src="https://raw.githubusercontent.com/HESEB/buget/main/assets/net.png">
        <div id="target" class="target"></div>
      </div>
      <div class="body">
        <div id="name" style="font-weight:1000;text-align:center;margin-bottom:8px"></div>
        <div class="bar"><div id="cur" class="cur"></div></div>
        <div id="judge" style="text-align:center;font-weight:1000;margin-top:8px">타이밍!</div>
        <div class="row"><button id="catch">채집!</button><button id="close">닫기</button></div>
      </div>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="box">
      <button id="closeModal" class="close">닫기</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
