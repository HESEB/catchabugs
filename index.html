<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>CatchABugs v0.2</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07111e;font-family:system-ui,-apple-system,'Noto Sans KR',sans-serif}button{font-family:inherit;touch-action:manipulation}#title,#game{position:fixed;inset:0}#title{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:12px;padding:32px 18px;box-sizing:border-box;color:white;text-align:center;background:#07111e url('https://raw.githubusercontent.com/HESEB/buget/main/assets/title.png') center/cover no-repeat}#title:before{content:'';position:absolute;inset:0;background:linear-gradient(#0002,#000d)}#title>*{position:relative}.logo{font-size:42px;font-weight:1000;text-shadow:0 12px 24px #000}.sub{font-size:13px;font-weight:800;color:#ffffffcc}.prof{background:#ffffff22;border:1px solid #ffffff44;border-radius:18px;padding:12px 14px;max-width:330px;font-weight:900}.btn{border:0;border-radius:18px;padding:15px 22px;min-width:230px;font-size:16px;font-weight:1000;background:linear-gradient(120deg,#82f7c1,#6bb2ff,#a573ed);color:#101522;box-shadow:0 16px 34px #0008}.ghost{background:#ffffff24;color:white;border:1px solid #ffffff44}#game{display:none;background:#70c878;touch-action:none;user-select:none}.map{position:absolute;inset:-50%;background:#70c878 url('https://raw.githubusercontent.com/HESEB/buget/main/assets/map_background.png') center/260px repeat;transform-origin:50% 50%;will-change:transform}.map:after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 25% 30%,#fff5,transparent 14%),radial-gradient(circle at 70% 65%,#07551f55,transparent 32%)}#bugs{position:absolute;inset:0;z-index:4}.player{position:absolute;left:50%;top:50%;width:100px;height:120px;transform:translate(-50%,-50%);z-index:7;filter:drop-shadow(0 16px 18px #0007);display:flex;align-items:center;justify-content:center;font-size:70px}.player img{width:100%;height:100%;object-fit:contain}.bug{position:absolute;left:50%;top:50%;z-index:4;text-align:center;transform-origin:50% 70%;transition:filter .15s}.bug .sp{width:68px;height:68px;border-radius:20px;background:#fffffff0;display:flex;align-items:center;justify-content:center;overflow:hidden;border:3px solid var(--c,#ffd166);box-shadow:0 10px 22px #0005,0 0 16px var(--c,#ffd166);font-size:30px}.bug img{width:100%;height:100%;object-fit:contain}.lab{font-size:11px;color:white;font-weight:900;text-shadow:0 2px 8px #000}.hud{position:absolute;left:10px;right:10px;top:10px;z-index:9;display:flex;justify-content:space-between;gap:8px;pointer-events:none}.card{background:#ffffffe8;border-radius:16px;padding:10px 12px;font-weight:900;box-shadow:0 10px 24px #0004;pointer-events:auto}.toast{position:absolute;left:50%;bottom:80px;transform:translateX(-50%);background:#000b;color:#fff;border-radius:999px;padding:10px 13px;font-weight:900;display:none;z-index:20;white-space:nowrap}.bottom{position:absolute;left:0;right:0;bottom:0;z-index:10;display:flex;justify-content:center;gap:8px;padding:10px}.mini{border:0;border-radius:16px;padding:12px 14px;background:#ffffff2b;border:1px solid #fff4;color:white;font-weight:1000}.enc{position:fixed;inset:0;background:#0009;display:none;z-index:30}.panel{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);width:min(92vw,430px);background:#fff;border-radius:24px;overflow:hidden}.stage{height:210px;background:linear-gradient(#96ddff,#62bd7e);position:relative}.target{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);width:110px;height:110px;border-radius:30px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;border:4px solid var(--c,#ffd166)}.target img{width:100%;height:100%;object-fit:contain}.net{position:absolute;right:-25px;bottom:-35px;width:200px}.body{padding:14px}.bar{height:32px;border-radius:18px;position:relative;overflow:hidden;background:linear-gradient(90deg,#e94d73 0 25%,#ffd166 25% 40%,#20b486 40% 60%,#ffd166 60% 75%,#e94d73 75%)}.cur{position:absolute;top:-4px;width:6px;height:42px;background:#111;border-radius:4px;box-shadow:0 0 0 2px white}.row{display:flex;gap:8px;margin-top:12px}.row button{flex:1;border:0;border-radius:14px;padding:12px;font-weight:1000}.modal{position:fixed;inset:0;background:#0009;display:none;z-index:40;padding:40px 14px;box-sizing:border-box}.box{background:white;border-radius:22px;padding:16px;max-height:80vh;overflow:auto}.dexitem{display:flex;align-items:center;gap:10px;background:#0000000f;border-radius:16px;padding:10px;margin:8px 0}.dexitem img{width:52px;height:52px;object-fit:contain;background:#fff;border-radius:14px}.close{float:right;border:0;border-radius:12px;padding:8px 10px;font-weight:900}</style></head><body><div id="title"><div class="logo">CatchABugs</div><div class="sub">캡챠벅스 v0.2</div><div class="prof">👨‍🔬 호박사<br>“움직였는데 풀도 안 움직이면 이상하지. 그래서 고쳤다. 아마도.”</div><button id="start" class="btn">탐험 시작</button><button id="openDexTitle" class="btn ghost">도감 보기</button></div><div id="game"><div id="map" class="map"></div><div id="bugs"></div><div class="player"><img src="https://raw.githubusercontent.com/HESEB/buget/main/assets/player.png" onerror="this.remove();this.parentNode.textContent='🧢'"></div><div class="hud"><div class="card">월드 좌표 이동</div><div class="card">연구별 <span id="pt">0</span></div></div><div class="bottom"><button id="openDex" class="mini">도감</button><button id="diary" class="mini">일기</button><button id="home" class="mini">귀환</button></div><div id="toast" class="toast"></div></div><div id="enc" class="enc"><div class="panel"><div class="stage"><img class="net" src="https://raw.githubusercontent.com/HESEB/buget/main/assets/net.png"><div id="target" class="target"></div></div><div class="body"><div id="name" style="font-weight:1000;text-align:center;margin-bottom:8px"></div><div class="bar"><div id="cur" class="cur"></div></div><div id="judge" style="text-align:center;font-weight:1000;margin-top:8px">타이밍!</div><div class="row"><button id="catch">채집!</button><button id="close">닫기</button></div></div></div></div><div id="modal" class="modal"><div class="box"><button id="closeModal" class="close">닫기</button><div id="modalBody"></div></div></div><script>const BASE='https://raw.githubusercontent.com/HESEB/buget/main/assets/';const B=[['개미','ant.png','🐜'],['배추흰나비','cabbage_butterfly.png','🦋'],['청띠신선나비','blue_band_butterfly.png','🦋'],['검노랑나비','black_yellow_butterfly.png','🦋'],['잠자리','brown_dragonfly.png','🪰'],['물방개','diving_beetle.png','🪲'],['반딧불이','firefly.png','✨'],['장수말벌','giant_hornet.png','🐝'],['물장군','giant_water_bug.png','🪲'],['귀뚜라미','cricket.png','🦗']];const GR=[['빨강','#ff4a4a',10,.72,1],['주황','#ff9d3d',14,.70,1.05],['노랑','#ffe45c',18,.68,1.1],['초록','#43d96b',24,.65,1.15],['파랑','#4fb2ff',32,.62,1.22],['보라','#a573ed',56,.54,1.4],['실버','#d8e3ee',76,.5,1.5],['골드','#ffd166',110,.46,1.6],['다이아','#9ff8ff',180,.42,1.75]].map(x=>({name:x[0],color:x[1],pts:x[2],rate:x[3],speed:x[4]}));let player={x:0,y:0,head:0};let pt=0,ents=[],drag=false,lx=0,ly=0,vx=0,vy=0,cur=null,t0=0,caught={},lastEvent='오늘은 아직 특별한 일이 없었다. 호박사: “그런 날도 있는 거지.”';function img(b){return `<img src="${BASE}insects/${b[1]}" onerror="this.remove();this.parentNode.textContent='${b[2]}'">`}function toast(s){let t=document.getElementById('toast');t.textContent=s;t.style.display='block';clearTimeout(toast.t);toast.t=setTimeout(()=>t.style.display='none',1300)}function pickGrade(){let r=Math.random();if(r<.004)return GR[8];if(r<.018)return GR[7];if(r<.055)return GR[6];if(r<.13)return GR[5];if(r<.27)return GR[4];if(r<.45)return GR[3];if(r<.65)return GR[2];if(r<.83)return GR[1];return GR[0]}function spawnNear(){let b=B[Math.floor(Math.random()*B.length)],g=pickGrade(),a=Math.random()*Math.PI*2,d=130+Math.random()*360;ents.push({b,g,wx:player.x+Math.cos(a)*d,wy:player.y+Math.sin(a)*d,signal:Math.random()<.35,drift:Math.random()*6.28})}function start(){document.getElementById('title').style.display='none';document.getElementById('game').style.display='block';while(ents.length<8)spawnNear();toast('호박사: 이제 풀도 같이 움직인다. 풀한테 고맙다고 해라.')}function screenPos(e){return{x:(e.wx-player.x)*1.0,y:(e.wy-player.y)*1.0}}function render(){document.getElementById('map').style.transform=`translate(${-player.x%260}px,${-player.y%260}px) scale(1.2)`;let box=document.getElementById('bugs');box.innerHTML='';ents=ents.filter(e=>Math.hypot(e.wx-player.x,e.wy-player.y)<900);while(ents.length<8)spawnNear();ents.forEach((e,i)=>{e.drift+=.01;e.wx+=Math.sin(e.drift)*.05;e.wy+=Math.cos(e.drift*.7)*.04;let p=screenPos(e),d=Math.hypot(p.x,p.y);let n=document.createElement('div');n.className='bug';let scale=Math.max(.5,1.22-d/620);n.style.transform=`translate(calc(50% + ${p.x}px),calc(50% + ${p.y}px)) translate(-50%,-50%) scale(${scale})`;n.style.filter=d>420?'blur(1px)':'';let unknown=e.signal&&d>120;let body=unknown?'<div class="sp" style="font-size:30px">?</div>':`<div class="sp" style="--c:${e.g.color}">${img(e.b)}</div>`;n.innerHTML=body+`<div class="lab">${d<92?'조사 가능':'가까이'} · ${unknown?'생태 신호':e.b[0]}</div>`;n.onclick=()=>{if(d>92)toast('더 가까이 가야 해');else openEnc(i)};box.appendChild(n)});document.getElementById('pt').textContent=pt}function move(forward,side){player.x+=side;player.y-=forward}function openEnc(i){cur=i;t0=performance.now();let e=ents[i];e.signal=false;if(Math.random()<.12){toast('착각이었다! 자연해호가였다. 연구별 +5');pt+=5;lastEvent='생태 신호인 줄 알았는데 자연해호가였다. 호박사: “이름은 좀 이상하지만 좋은 사람이야.”';ents.splice(i,1);cur=null;return}document.getElementById('target').style.setProperty('--c',e.g.color);document.getElementById('target').innerHTML=img(e.b);document.getElementById('name').textContent=e.g.name+' '+e.b[0];document.getElementById('enc').style.display='block'}function closeEnc(){document.getElementById('enc').style.display='none';cur=null}function pos(){return(0.5+0.5*Math.sin((performance.now()-t0)*.001*Math.PI*2))*100}function judge(p){let d=Math.abs(p-50);if(d<7)return['PERFECT',30,1.5];if(d<16)return['GREAT',22,1.25];if(d<28)return['GOOD',15,1.1];return['MISS',0,.8]}function loop(){vx*=.86;vy*=.86;if(Math.abs(vx)+Math.abs(vy)>.001)move(vy*8,vx*8);render();if(cur!==null){let p=pos(),j=judge(p);document.getElementById('cur').style.left=`calc(${p}% - 3px)`;document.getElementById('judge').textContent=j[0]}requestAnimationFrame(loop)}function openModal(html){document.getElementById('modalBody').innerHTML=html;document.getElementById('modal').style.display='block'}function openDex(){let html='<h2>곤충 앨범</h2>'+B.map(b=>`<div class="dexitem">${img(b)}<div><b>${b[0]}</b><br>만난 수: ${caught[b[0]]||0}<br><small>호박사 메모: ${caught[b[0]]?'봤다. 귀엽다. 아마도.':'아직 못 봤다. 나도 궁금하다.'}</small></div></div>`).join('');openModal(html)}document.getElementById('start').onclick=start;document.getElementById('openDexTitle').onclick=()=>{start();openDex()};document.getElementById('openDex').onclick=openDex;document.getElementById('diary').onclick=()=>openModal('<h2>오늘의 탐험일기</h2><p>'+lastEvent+'</p>');document.getElementById('home').onclick=()=>toast('호박사: 귀환석은 다음 버전에서 줄게. 지금은 걸어.');document.getElementById('closeModal').onclick=()=>document.getElementById('modal').style.display='none';document.getElementById('close').onclick=closeEnc;document.getElementById('catch').onclick=()=>{if(cur===null)return;let e=ents[cur],j=judge(pos()),rate=Math.max(.1,Math.min(.95,e.g.rate+(j[1]?0.08:-.1)));if(Math.random()<rate&&j[1]>0){let gain=Math.round(e.g.pts*j[2]);pt+=gain;caught[e.b[0]]=(caught[e.b[0]]||0)+1;lastEvent=e.g.name+' '+e.b[0]+'를 만났다. 호박사: “오, 그건 나도 좀 보고 싶은데?”';ents.splice(cur,1);toast(j[0]+'! 연구별 +'+gain);closeEnc()}else toast('놓쳤다. 그래도 흔적은 남았다.')};let g=document.getElementById('game');g.addEventListener('pointerdown',e=>{drag=true;lx=e.clientX;ly=e.clientY});g.addEventListener('pointermove',e=>{if(!drag)return;let dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;vx=Math.max(-1,Math.min(1,dx*.025));vy=Math.max(-1,Math.min(1,-dy*.025))});g.addEventListener('pointerup',()=>drag=false);g.addEventListener('pointercancel',()=>drag=false);requestAnimationFrame(loop);</script></body></html>
