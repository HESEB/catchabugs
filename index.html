<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>CatchABugs Engine-01</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="title">
    <div class="logo">CatchABugs</div>
    <div class="sub">캡챠벅스 Engine-01</div>
    <div class="prof">👨‍🔬 호박사<br>“레이더가 진짜 신호를 잡기 시작했어.”</div>
    <button id="start" class="btn">탐험 시작</button>
    <button id="openDexTitle" class="btn ghost">도감 보기</button>
  </div>

  <div id="game">
    <div id="map" class="map"></div>
    <div id="bugs"></div>
    <div class="player"><img src="assets/player.png" onerror="this.remove();this.parentNode.textContent='🧢'"></div>
    <div class="hud">
      <div class="card">Engine-01</div>
      <div class="card">연구별 <span id="pt">0</span></div>
    </div>
    <div id="radar" class="radar" aria-label="곤충 레이더">
      <div class="radar-head"><span>BUG RADAR</span><b id="radarCount">0</b></div>
      <div id="radarScreen" class="radar-screen">
        <div class="radar-ring r1"></div>
        <div class="radar-ring r2"></div>
        <div class="radar-ring r3"></div>
        <div class="radar-axis x"></div>
        <div class="radar-axis y"></div>
        <div class="radar-sweep"></div>
        <div class="radar-center"></div>
      </div>
      <div id="radarHint" class="radar-hint">신호 탐색중</div>
    </div>
    <div class="bottom">
      <button id="openDex" class="mini">도감</button>
      <button id="openQuest" class="mini">퀘스트</button>
      <button id="diary" class="mini">일기</button>
      <button id="home" class="mini">귀환</button>
    </div>
    <div id="toast" class="toast"></div>
  </div>

  <div id="enc" class="enc">
    <div class="panel">
      <div class="stage">
        <img class="net" src="assets/net.png">
        <div id="target" class="target"></div>
      </div>
      <div class="body">
        <div id="name" style="font-weight:1000;text-align:center;margin-bottom:8px"></div>
        <div class="bar"><div id="cur" class="cur"></div></div>
        <div id="judge" style="text-align:center;font-weight:1000;margin-top:8px">타이밍!</div>
        <div class="row"><button id="catch">채집!</button><button id="close">닫기</button></div>
      </div>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="box">
      <button id="closeModal" class="close">닫기</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script type="module" src="src/main-radar.js"></script>
  <script type="module" src="src/region-remaster.js"></script>
</body>
</html>
